<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Modern Clicker Evolution</title>
<style>
:root { --bg: #020617; --card: #111827; --accent: #3b82f6; --green: #22c55e; --purple: #a855f7; }
body { font-family: 'Segoe UI', Arial; background: var(--bg); color: white; margin: 0; overflow: hidden; display: flex; height: 100vh; }

/* Боковые панели */
.side-panel { width: 280px; background: rgba(17, 24, 39, 0.9); padding: 20px; overflow-y: auto; border-right: 1px solid #1e293b; z-index: 10; scroll-behavior: smooth; }
.side-panel.right { border-right: none; border-left: 1px solid #1e293b; }
.side-panel::-webkit-scrollbar { width: 6px; }
.side-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

/* Центр */
.main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); }

.card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; border: 1px solid #1e293b; }
.stat-box { font-size: 18px; margin: 5px; font-weight: bold; }
.stat-val { color: var(--accent); }

button { background: linear-gradient(135deg, var(--green), #16a34a); border: none; color: white; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: bold; width: 100%; margin-top: 5px; }
button:hover { transform: scale(1.03); filter: brightness(1.1); }
button:active { transform: scale(0.95); }

.bigClick { font-size: 35px; padding: 40px 80px; border-radius: 30px; background: linear-gradient(135deg, #3b82f6, #2563eb); width: auto; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); margin-top: 15px; }

/* Ветка (модалка) */
#treeModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; overflow: hidden; }
#treeMap { position: absolute; width: 3000px; height: 3000px; cursor: grab; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 50px 50px; }
#treeMap:active { cursor: grabbing; }
.node { position: absolute; width: 180px; padding: 15px; background: #1e293b; border: 2px solid #334155; border-radius: 50%; text-align: center; cursor: pointer; transform: translate(-50%, -50%); transition: 0.3s; font-size: 14px; display: flex; flex-direction: column; justify-content: center; height: 180px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.node.bought { background: var(--green); border-color: #4ade80; box-shadow: 0 0 30px rgba(34, 197, 94, 0.4); }
.close-tree { position: fixed; top: 20px; right: 20px; width: auto; z-index: 101; background: #ef4444; padding: 10px 20px; }

/* Анимация клика */
.click-anim { position: absolute; pointer-events: none; color: #60a5fa; font-weight: bold; font-size: 24px; animation: fly 0.7s ease-out forwards; z-index: 50; text-shadow: 0 0 5px black; }
@keyframes fly { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }
</style>
</head>
<body>

<!-- ЛЕВАЯ ПАНЕЛЬ (ЗА МОНЕТЫ) -->
<div class="side-panel">
    <h2 style="text-align:center">🪙 Монеты</h2>
    <div id="coinUpgrades">
        <div class="card">
            <h3>Улучшение клика</h3>
            <p>Цена: <span id="coinUpgradeCost">5</span> 🪙</p>
            <button onclick="buyCoinUpgrade()">Купить</button>
        </div>
    </div>
</div>

<!-- ЦЕНТР -->
<div class="main-area">
    <div class="card" style="min-width: 320px;">
        <div class="stat-box">💰 Деньги: <span id="money" class="stat-val">0</span></div>
        <div class="stat-box">🪙 Монеты: <span id="coins" class="stat-val">0</span></div>
        <div class="stat-box">🔥 Ребирты: <span id="rebirths" class="stat-val">0</span></div>
        <div class="stat-box">⭐ Поинты: <span id="points" class="stat-val">0</span></div>
    </div>

    <button onclick="openTree()" style="width: 220px; background: var(--purple); font-size: 16px;">🕸️ Ветка ребиртов</button>
    <button class="bigClick" onclick="clickMoney(event)">КЛИК!</button>

    <div class="card" style="margin-top: 25px; width: 250px;">
        <h3>♻️ Ребирт</h3>
        <p style="font-size: 12px; color: #94a3b8;">Нужно: <span id="rebCostText">100,000</span></p>
        <button onclick="rebirth()" style="background: var(--purple);">Сделать</button>
    </div>
    
    <button onclick="resetGame()" style="background: #ef4444; width: auto; font-size: 10px; margin-top: 20px;">СБРОСИТЬ ВСЁ</button>
</div>

<!-- ПРАВАЯ ПАНЕЛЬ (ЗА ДЕНЬГИ) -->
<div class="side-panel right">
    <h2 style="text-align:center">💸 Магазин</h2>
    <div class="card">
        <h3>Сила клика</h3>
        <p>Цена: <span id="moneyUpgradeCost">50</span></p>
        <button onclick="buyMoneyUpgrade()">Купить</button>
    </div>
    <div class="card">
        <h3>Улучшение x3</h3>
        <p id="x3Info">След. цена: 10,000</p>
        <button id="x3Btn" onclick="buyX3()">Купить x3</button>
    </div>
    <div class="card">
        <h3>Автокликер</h3>
        <p>Цена: <span id="autoCost">2000</span></p>
        <button onclick="buyAuto()">Купить</button>
    </div>
</div>

<!-- ВЕТКА -->
<div id="treeModal">
    <button class="close-tree" onclick="closeTree()">Закрыть [X]</button>
    <div id="treeMap">
        <!-- Первое улучшение по центру (1500, 1500) -->
        <div id="node0" class="node" style="left: 1500px; top: 1500px;" onclick="buyTreeNode(0)">
            <b>Центр Паутины</b><br>
            +1 монета & x2 к клику<br>
            <br>Цена: 1 ⭐
        </div>
    </div>
</div>

<script>
// Глобальные переменные
let money=0, coins=0, rebirths=0, points=0;
let moneyUpgrade=0, coinUpgrade=0, moneyUpgradeCost=50, coinUpgradeCost=5;
let autoLevel=0, autoCost=2000;
let x3Level=0, x3Costs = [10000, 200000, 900000, 7000000, 82000000];

// Бонусы ветки
let treeX2 = 1, treeBonusCoins = 0, boughtNodes = [];

function getTotalClick() {
    let base = 1 + moneyUpgrade + coinUpgrade;
    let x3Mult = Math.pow(3, x3Level);
    let rebMult = Math.pow(2, rebirths);
    return base * x3Mult * rebMult * treeX2;
}

function clickMoney(e) {
    let power = getTotalClick();
    money += power;
    if(Math.random() < 0.01) coins += (1 + treeBonusCoins);
    
    // Анимация
    let anim = document.createElement('div');
    anim.className = 'click-anim';
    anim.innerText = '+' + Math.floor(power).toLocaleString();
    anim.style.left = e.pageX + 'px';
    anim.style.top = e.pageY + 'px';
    document.body.appendChild(anim);
    setTimeout(() => anim.remove(), 700);
    
    updateUI();
}

function buyMoneyUpgrade() {
    if(money >= moneyUpgradeCost) {
        money -= moneyUpgradeCost;
        moneyUpgrade++;
        moneyUpgradeCost *= 2;
        updateUI();
    }
}

function buyCoinUpgrade() {
    if(coins >= coinUpgradeCost) {
        coins -= coinUpgradeCost;
        coinUpgrade++;
        coinUpgradeCost *= 2;
        updateUI();
    }
}

function buyX3() {
    if(x3Level >= 5) return;
    let cost = x3Costs[x3Level];
    if(money >= cost) {
        money -= cost;
        x3Level++;
        updateUI();
    }
}

function buyAuto() {
    if(money >= autoCost) {
        money -= autoCost;
        autoLevel++;
        autoCost *= 2;
        updateUI();
    }
}

function getRebirthCost() {
    if(rebirths === 0) return 100000;
    return 20000000 * Math.pow(4, rebirths - 1); // 20м для второго, потом растет
}

function rebirth() {
    let cost = getRebirthCost();
    if(money >= cost) {
        rebirths++;
        points++;
        // Сброс временных данных
        money=0; coins=0; moneyUpgrade=0; coinUpgrade=0;
        moneyUpgradeCost=50; coinUpgradeCost=5;
        autoLevel=0; autoCost=2000; x3Level=0;
        save();
        updateUI();
    }
}

// Система Ветки
const treeMap = document.getElementById('treeMap');
let isDragging = false, startX, startY, scrollX, scrollY;

function openTree() {
    document.getElementById('treeModal').style.display = 'block';
    // Центрируем карту при первом открытии
    if(!treeMap.style.left) {
        treeMap.style.left = (window.innerWidth/2 - 1500) + 'px';
        treeMap.style.top = (window.innerHeight/2 - 1500) + 'px';
    }
}
function closeTree() { document.getElementById('treeModal').style.display = 'none'; }

treeMap.onmousedown = (e) => {
    isDragging = true;
    startX = e.pageX - treeMap.offsetLeft;
    startY = e.pageY - treeMap.offsetTop;
};
window.onmouseup = () => isDragging = false;
window.onmousemove = (e) => {
    if(!isDragging) return;
    treeMap.style.left = (e.pageX - startX) + 'px';
    treeMap.style.top = (e.pageY - startY) + 'px';
};

function buyTreeNode(id) {
    if(id === 0 && points >= 1 && !boughtNodes.includes(0)) {
        points -= 1;
        boughtNodes.push(0);
        treeX2 = 2;
        treeBonusCoins = 1;
        document.getElementById('node0').classList.add('bought');
        updateUI();
    }
}

function updateUI() {
    document.getElementById('money').innerText = Math.floor(money).toLocaleString();
    document.getElementById('coins').innerText = coins;
    document.getElementById('rebirths').innerText = rebirths;
    document.getElementById('points').innerText = points;
    document.getElementById('moneyUpgradeCost').innerText = moneyUpgradeCost.toLocaleString();
    document.getElementById('coinUpgradeCost').innerText = coinUpgradeCost;
    document.getElementById('autoCost').innerText = autoCost.toLocaleString();
    document.getElementById('rebCostText').innerText = getRebirthCost().toLocaleString();
    
    if(x3Level < 5) {
        document.getElementById('x3Info').innerText = "Цена: " + x3Costs[x3Level].toLocaleString();
    } else {
        document.getElementById('x3Info').innerText = "МАКСИМУМ";
        document.getElementById('x3Btn').disabled = true;
    }
    
    if(boughtNodes.includes(0)) document.getElementById('node0').classList.add('bought');
    save();
}

// Автокликер
setInterval(() => {
    if(autoLevel > 0) {
        money += (autoLevel * getTotalClick()) / 2;
        updateUI();
    }
}, 1000);

function save() {
    const data = { money, coins, rebirths, points, moneyUpgrade, coinUpgrade, moneyUpgradeCost, coinUpgradeCost, autoLevel, autoCost, x3Level, boughtNodes, treeX2, treeBonusCoins };
    localStorage.setItem('clicker_pro_save', JSON.stringify(data));
}

function load() {
    let s = JSON.parse(localStorage.getItem('clicker_pro_save'));
    if(s) {
        Object.assign(window, s);
        updateUI();
    }
}

function resetGame() {
    if(confirm("Удалить весь прогресс?")) {
        localStorage.clear();
        location.reload();
    }
}

window.onload = load;
</script>
</body>
</html>
