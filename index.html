<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Clicker Evolution</title>
<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#020617,#0f172a);color:white;overflow:hidden}

.topbar{position:fixed;top:10px;left:0;right:0;text-align:center;z-index:5}

.branchBtn{background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;padding:10px 18px;border-radius:14px;color:white;font-size:15px;cursor:pointer}

.mainClick{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
padding:30px 60px;
border-radius:30px;
border:none;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
cursor:pointer;
transition:.1s;
}

.mainClick:active{transform:translate(-50%,-50%) scale(.9)}

.panel{
position:fixed;
top:0;
bottom:0;
width:260px;
overflow-y:auto;
padding:15px;
}

.left{left:0;background:#020617aa}
.right{right:0;background:#020617aa}

.card{background:#111827;margin-bottom:12px;padding:12px;border-radius:14px}
button{margin-top:6px;width:100%;padding:8px;border-radius:10px;border:none;background:#22c55e;color:white;cursor:pointer}

.stats{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);text-align:center}

.clickAnim{position:absolute;font-weight:bold;pointer-events:none;animation:fly .6s forwards}

@keyframes fly{
0%{opacity:1;transform:translateY(0)}
100%{opacity:0;transform:translateY(-60px)}
}

.branchScreen{
position:fixed;
inset:0;
background:#000c;
display:none;
overflow:hidden;
}

.branchMap{
position:absolute;
width:2000px;
height:2000px;
cursor:grab;
}

.node{
position:absolute;
padding:10px 14px;
background:#7c3aed;
border-radius:14px;
cursor:pointer;
white-space:nowrap
}

</style>
</head>
<body>

<div class="topbar">
<button class="branchBtn" onclick="toggleBranch()">🌌 Ветка ребиртов</button>
</div>

<button class="mainClick" onclick="clickMoney(event)">КЛИК</button>

<div class="panel left" id="coinPanel"></div>
<div class="panel right" id="clickPanel"></div>

<div class="stats">
💰 <span id="money">0</span>
🪙 <span id="coins">0</span>
🔥 <span id="rebirths">0</span>
⭐ <span id="points">0</span>
</div>

<div class="branchScreen" id="branchScreen">
<div class="branchMap" id="branchMap"></div>
</div>

<script>
let money=0
let coins=0
let rebirths=0
let points=0

let clickAdd=0
let clickMulti=1
let rebirthMulti=1

let coinChance=0.01
let bonusCoins=0

let rebirthCost=100000

let branchUnlocked=false

function totalClick(){
return (1+clickAdd)*clickMulti*rebirthMulti
}

function clickMoney(e){
let val=totalClick()
money+=val

if(Math.random()<coinChance) coins+=1+bonusCoins

spawnAnim(e,val)
update()
}

function spawnAnim(e,val){
let d=document.createElement('div')
d.className='clickAnim'
d.innerText='+'+val

d.style.left=e.clientX+'px'
d.style.top=e.clientY+'px'

document.body.appendChild(d)
setTimeout(()=>d.remove(),600)
}

function rebirth(){
if(money>=rebirthCost){
rebirths++
points++
rebirthMulti*=2

money=0
coins=0
clickAdd=0
clickMulti=1
coinChance=0.01

if(rebirths==1) rebirthCost=20000000

update()
}
}

// ветка

let map=document.getElementById('branchMap')

let nodes=[
{
x:950,y:950,
text:'x2 к клику +1 монета',
buy(){
if(points>=1){
points--
clickMulti*=2
bonusCoins+=1
this.bought=true
spawnNext()
}
}
}
]

function spawnNext(){
if(branchUnlocked) return
branchUnlocked=true

createNode(1100,950,'x3 клику 10k',()=>buyX3(10000))
createNode(1250,950,'x3 клику 200k',()=>buyX3(200000))
createNode(1400,950,'x3 клику 900k',()=>buyX3(900000))
createNode(1550,950,'x3 клику 7m',()=>buyX3(7000000))
createNode(1700,950,'x3 клику 82m',()=>buyX3(82000000))
}

function createNode(x,y,text,fn){
let n=document.createElement('div')
n.className='node'
n.style.left=x+'px'
n.style.top=y+'px'
n.innerText=text
n.onclick=fn
map.appendChild(n)
}

function buyX3(cost){
if(money>=cost){
money-=cost
clickMulti*=3
update()
}
}

nodes.forEach(n=>{
let d=document.createElement('div')
d.className='node'
d.style.left=n.x+'px'
d.style.top=n.y+'px'
d.innerText=n.text

d.onclick=()=>n.buy()
map.appendChild(d)
})

// движение карты
let isDrag=false, sx=0, sy=0
map.onmousedown=e=>{isDrag=true;sx=e.clientX-map.offsetLeft;sy=e.clientY-map.offsetTop}
document.onmouseup=()=>isDrag=false
document.onmousemove=e=>{
if(isDrag){
map.style.left=e.clientX-sx+'px'
map.style.top=e.clientY-sy+'px'
}
}

function toggleBranch(){
let s=document.getElementById('branchScreen')
s.style.display=s.style.display=='block'?'none':'block'
}

function update(){
money=Math.floor(money)
document.getElementById('money').innerText=money
document.getElementById('coins').innerText=coins
document.getElementById('rebirths').innerText=rebirths
document.getElementById('points').innerText=points
}

update()
</script>
</body>
</html>
